#Execs
exec-once=/usr/lib/polkit-kde-authentication-agent-j
exec-once=mako -c ~/.config/mako/config
exec-once = udiskie &
exec-once = waybar
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once=~/.config/hypr/scripts/gtkthemes.sh
# For screen sharing
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hypridle
#exec-once = swaybg -i ~/.config/hypr/images/tired.jpg
#exec-once = swaybg -i ~/.config/hypr/images/tomie2.png
#exec-once = swaybg -i ~/.config/hypr/images/backiee-327973-landscape.jpg
exec-once = hyprpaper

