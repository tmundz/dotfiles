# tmux config for Hyprland/Wayland.
# Window-manager binds stay on SUPER/ALT; tmux binds stay behind C-a,
# except for vim-tmux-navigator's terminal-local C-h/j/k/l.

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal behavior
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -g focus-events on
set -g set-clipboard on

# Windows and panes
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g mouse on

# Responsiveness and history
set -s escape-time 0
set -g repeat-time 300
set -g history-limit 50000

# Status
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 60
set -g status-right-length 80

# Vim-aware pane navigation
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# Prefix-scoped pane navigation is useful when an app owns C-h/j/k/l.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Splits and new windows open in the current path.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Resize panes.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config.
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# Vi copy mode with Wayland clipboard.
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# Popups.
bind g if-shell "command -v lazygit >/dev/null 2>&1" \
  "display-popup -d '#{pane_current_path}' -w 90% -h 90% -E 'lazygit'" \
  "display-message 'lazygit is not installed'"

bind f if-shell "command -v yazi >/dev/null 2>&1" \
  "display-popup -d '#{pane_current_path}' -w 90% -h 90% -E 'yazi'" \
  "display-message 'yazi is not installed'"

# Simple Catppuccin Mocha status line with the desktop's mauve accent.
set -g status-style "fg=#cdd6f4,bg=#181825"
set -g status-left "#[fg=#11111b,bg=#cba6f7,bold] #S #[fg=#585b70,bg=#181825] | "
set -g status-right "#[fg=#11111b,bg=#cba6f7,bold] %H:%M #[fg=#cdd6f4,bg=#181825] #h "
set -g window-status-separator ""
set -g window-status-format "#[fg=#9399b2,bg=#313244] #I:#W "
set -g window-status-current-format "#[fg=#11111b,bg=#cba6f7,bold] #I:#W "
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"
set -g message-style "fg=#11111b,bg=#cba6f7"
set -g mode-style "fg=#11111b,bg=#cba6f7"
