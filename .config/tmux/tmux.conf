# ─────────────────────────────────────────────────────────────
#  tmux.conf  —  necronom  /  vim-tmux-navigator aware
# ─────────────────────────────────────────────────────────────

# Prefix: Ctrl-a (easier than Ctrl-b)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# True colour support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# 0-index panes and windows from 1 (easier to reach)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Mouse support
set -g mouse on

# Faster key repetition
set -s escape-time 0
set -g repeat-time 300

# Bigger history
set -g history-limit 50000

# Status refresh
set -g status-interval 5
set -g status-position bottom

# ── Vim-tmux-navigator (smart C-h/j/k/l) ───────────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# ── Splits (intuitive keys) ──────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Resize panes ─────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload config ─────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# ── Catppuccin Mocha theme for tmux ──────────────────────────
# Colours from catppuccin mocha
thm_bg="#1e1e2e"
thm_fg="#cdd6f4"
thm_cyan="#89dceb"
thm_black="#181825"
thm_gray="#313244"
thm_magenta="#cba6f7"
thm_pink="#f38ba8"
thm_red="#f38ba8"
thm_green="#a6e3a1"
thm_yellow="#f9e2af"
thm_blue="#89b4fa"
thm_orange="#fab387"
thm_black4="#585b70"

set -g status-style "fg=$thm_fg,bg=$thm_black"
set -g status-left-length 100
set -g status-right-length 100

set -g status-left "#[fg=$thm_blue,bold] #S #[fg=$thm_black4] │ "
set -g status-right " #[fg=$thm_fg]%H:%M  #[fg=$thm_black4]#h "

set -g window-status-separator ""
set -g window-status-format "#[fg=$thm_black4] #I:#W "
set -g window-status-current-format "#[fg=$thm_magenta,bold] #I:#W "

set -g pane-border-style "fg=$thm_gray"
set -g pane-active-border-style "fg=$thm_blue"
set -g message-style "fg=$thm_yellow,bg=$thm_black"

# ── Vi-mode copy ────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ── Popup sessions (quick access) ───────────────────────────
# <prefix> g = lazygit popup
bind g display-popup -d '#{pane_current_path}' -w 90% -h 90% -E "lazygit"
# <prefix> f = file manager
bind f display-popup -d '#{pane_current_path}' -w 90% -h 90% -E "yazi"
